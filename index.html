<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />

    <!-- SEO -->
    <title>Avelorx — Real-Time Queue Intelligence</title>
    <meta name="description" content="Avelorx is a real-time queue visibility and time optimization platform. Discover nearby services, see live wait times, and join queues remotely. Never waste time waiting again." />
    <meta name="keywords" content="queue management, real-time wait time, queue visibility, time optimization, remote queue, virtual queue, wait time app" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://avelorx.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://avelorx.com" />
    <meta property="og:title" content="Avelorx — Real-Time Queue Intelligence" />
    <meta property="og:description" content="Discover nearby services, see live wait times, and join queues remotely. Time, in motion." />
    <meta property="og:image" content="https://avelorx.com/favicon.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Avelorx" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Avelorx — Real-Time Queue Intelligence" />
    <meta name="twitter:description" content="Discover nearby services, see live wait times, and join queues remotely. Time, in motion." />
    <meta name="twitter:image" content="https://avelorx.com/favicon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />

    <!-- GEO: JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Avelorx",
      "url": "https://avelorx.com",
      "logo": "https://avelorx.com/favicon.png",
      "description": "Avelorx is a real-time queue visibility and time optimization platform for offline services. Users can discover nearby businesses, view live wait times across restaurants, salons, clinics, and diagnostic centers, join queues remotely, and track their position in real time.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Real-time wait time visibility",
        "Remote queue joining",
        "Live queue position tracking",
        "Category-based service discovery",
        "Business queue management dashboard",
        "Customer flow optimization"
      ],
      "audience": {
        "@type": "Audience",
        "audienceType": "Urban consumers and service businesses"
      },
      "slogan": "Time, in motion.",
      "sameAs": [
        "https://github.com/stalwartszen/avelorx"
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
